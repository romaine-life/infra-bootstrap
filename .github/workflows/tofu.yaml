name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths: ['tofu/**']
  push:
    branches: [main]
    paths: ['tofu/**', 'k8s/**']
  workflow_dispatch:

concurrency:
  group: opentofu-infra-bootstrap.tfstate
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.11.0'

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        id: secrets
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"
          echo "github_pat=$GITHUB_PAT" >> $GITHUB_OUTPUT

          AUTH0_SECRET=$(az keyvault secret show --vault-name romaine-kv --name auth0-client-secret --query value -o tsv)
          echo "::add-mask::$AUTH0_SECRET"
          echo "auth0_secret=$AUTH0_SECRET" >> $GITHUB_OUTPUT

      - name: Initialize OpenTofu
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=nelsontofu" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra-bootstrap.tfstate"

      - name: Plan
        id: plan
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
          TF_VAR_github_owner: nelsong6
          TF_VAR_cluster_subscription_id: ${{ vars.CLUSTER_ARM_SUBSCRIPTION_ID }}
          TF_VAR_cluster_resource_group_name: ${{ vars.CLUSTER_RESOURCE_GROUP_NAME || 'infra' }}
          AUTH0_CLIENT_SECRET: ${{ steps.secrets.outputs.auth0_secret }}
        run: |
          set -o pipefail
          tofu plan -out=tfplan 2>&1 | tee plan_output.txt

          # Check plan for actual changes using tofu show
          PLAN_JSON=$(tofu show -json tfplan)
          RESOURCE_CHANGES=$(echo "$PLAN_JSON" | jq '[.resource_changes[]? | select((.change.actions | . != ["no-op"]) or .change.importing)] | length')

          echo "Resource changes detected: $RESOURCE_CHANGES"
          if [ "$RESOURCE_CHANGES" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### Infrastructure changes detected ($RESOURCE_CHANGES resources)" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### No infrastructure changes detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('tofu/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `### OpenTofu Plan
            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### OpenTofu Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tofu/tfplan
          retention-days: 1

  apply:
    name: Apply
    needs: plan
    if: github.event_name != 'pull_request' && needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.11.0'

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        id: secrets
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"
          echo "github_pat=$GITHUB_PAT" >> $GITHUB_OUTPUT

          AUTH0_SECRET=$(az keyvault secret show --vault-name romaine-kv --name auth0-client-secret --query value -o tsv)
          echo "::add-mask::$AUTH0_SECRET"
          echo "auth0_secret=$AUTH0_SECRET" >> $GITHUB_OUTPUT

      - name: Initialize OpenTofu
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=nelsontofu" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra-bootstrap.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: tofu

      - name: Apply
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
          TF_VAR_github_owner: nelsong6
          TF_VAR_cluster_subscription_id: ${{ vars.CLUSTER_ARM_SUBSCRIPTION_ID }}
          TF_VAR_cluster_resource_group_name: ${{ vars.CLUSTER_RESOURCE_GROUP_NAME || 'infra' }}
          AUTH0_CLIENT_SECRET: ${{ steps.secrets.outputs.auth0_secret }}
        run: |
          tofu apply tfplan
          echo "### Apply successful" >> $GITHUB_STEP_SUMMARY

  bootstrap:
    name: Bootstrap Cluster
    needs: [plan, apply]
    if: always() && !cancelled() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      # ── Cluster access ───────────────────────────────────────────
      - name: Get AKS credentials
        id: aks
        env:
          CLUSTER_ARM_SUBSCRIPTION_ID: ${{ vars.CLUSTER_ARM_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}
          CLUSTER_RESOURCE_GROUP_NAME: ${{ vars.CLUSTER_RESOURCE_GROUP_NAME || 'infra' }}
        run: |
          if az aks get-credentials --subscription "$CLUSTER_ARM_SUBSCRIPTION_ID" --resource-group "$CLUSTER_RESOURCE_GROUP_NAME" --name infra-aks 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "### Bootstrap skipped — AKS cluster not found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Check ArgoCD ───────────────────────────────────────────────
      - name: Check ArgoCD
        id: argocd
        if: steps.aks.outputs.exists == 'true'
        run: |
          if kubectl get namespace argocd 2>/dev/null \
            && kubectl get deploy argocd-server -n argocd 2>/dev/null \
            && kubectl get application.argoproj.io apps -n argocd 2>/dev/null; then
            echo "status=deployed" >> $GITHUB_OUTPUT
          else
            echo "status=install" >> $GITHUB_OUTPUT
          fi

      # ── Install ArgoCD via Kustomize ─────────────────────────────
      # Uses the same kustomization.yaml + values.yaml that ArgoCD's
      # self-managed app uses. One definition, two consumers.
      - name: Install ArgoCD
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.status == 'install'
        env:
          CLUSTER_ARM_SUBSCRIPTION_ID: ${{ vars.CLUSTER_ARM_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}
          CLUSTER_RESOURCE_GROUP_NAME: ${{ vars.CLUSTER_RESOURCE_GROUP_NAME || 'infra' }}
        run: |
          kubectl delete namespace argocd --ignore-not-found --wait=true
          kubectl delete crd \
            applications.argoproj.io \
            applicationsets.argoproj.io \
            appprojects.argoproj.io \
            --ignore-not-found --wait=true
          kubectl delete clusterrole \
            argocd-application-controller \
            argocd-server \
            --ignore-not-found --wait=true
          kubectl delete clusterrolebinding \
            argocd-application-controller \
            argocd-server \
            --ignore-not-found --wait=true

          AKS_OIDC_ISSUER=$(az aks show \
            --subscription "$CLUSTER_ARM_SUBSCRIPTION_ID" \
            --resource-group "$CLUSTER_RESOURCE_GROUP_NAME" \
            --name infra-aks \
            --query oidcIssuerProfile.issuerUrl \
            -o tsv)
          export AKS_OIDC_ISSUER

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          values = Path("k8s/argocd/values.yaml").read_text()
          values = re.sub(
              r"issuer: https://westus2\.oic\.prod-aks\.azure\.com/[^\n]+",
              f"issuer: {os.environ['AKS_OIDC_ISSUER']}",
              values,
          )
          Path("/tmp/argocd-values.yaml").write_text(values)
          PY

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --version 9.5.2 \
            --namespace argocd \
            --create-namespace \
            --values /tmp/argocd-values.yaml \
            --wait \
            --timeout 5m
          kubectl rollout status deploy/argocd-server -n argocd --timeout=5m

      - name: Configure private repo access
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.status == 'install'
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          kubectl create secret generic infra-bootstrap-repo \
            --namespace argocd \
            --from-literal=type=git \
            --from-literal=url=https://github.com/nelsong6/infra-bootstrap.git \
            --from-literal=password="$GITHUB_PAT" \
            --from-literal=username=nelsong6 \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret infra-bootstrap-repo \
            --namespace argocd \
            argocd.argoproj.io/secret-type=repository \
            --overwrite

      # ── Docker Hub credentials for ArgoCD ──────────────────────────
      # ArgoCD needs Docker Hub auth to pull OCI Helm charts (Docker
      # Hub returns 401 on tag resolution even for public images).
      - name: Configure Docker Hub repo access
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.status == 'install'
        run: |
          DOCKER_USER=$(az keyvault secret show --vault-name romaine-kv --name docker-hub-username --query value -o tsv)
          DOCKER_TOKEN=$(az keyvault secret show --vault-name romaine-kv --name docker-hub-token --query value -o tsv)
          kubectl create secret generic docker-hub-repo \
            --namespace argocd \
            --from-literal=type=helm \
            --from-literal=url=registry-1.docker.io \
            --from-literal=enableOCI=true \
            --from-literal=username="$DOCKER_USER" \
            --from-literal=password="$DOCKER_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret docker-hub-repo \
            --namespace argocd \
            argocd.argoproj.io/secret-type=repository \
            --overwrite

      # ── ArgoCD OIDC credentials ────────────────────────────────────
      # Patch argocd-secret with OIDC creds from Key Vault. ArgoCD's
      # $key syntax resolves from argocd-secret only.
      - name: Sync ArgoCD OIDC credentials
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.status == 'install'
        run: |
          CLIENT_ID=$(az keyvault secret show --vault-name romaine-kv --name argocd-oidc-client-id --query value -o tsv)
          CLIENT_SECRET=$(az keyvault secret show --vault-name romaine-kv --name argocd-oidc-client-secret --query value -o tsv)
          kubectl patch secret argocd-secret -n argocd --type merge \
            -p "{\"stringData\":{\"oidc.clientId\":\"$CLIENT_ID\",\"oidc.clientSecret\":\"$CLIENT_SECRET\"}}"

      # ── Hand off to ArgoCD ───────────────────────────────────────
      # Apply all Application manifests — ArgoCD auto-syncs each one.
      # Everything else (Envoy Gateway, ExternalDNS, cert-manager,
      # Gateway resource, ClusterIssuer, certs, routes) is managed
      # by ArgoCD via these apps. Single source of truth.
      - name: Apply ArgoCD apps
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.status == 'install'
        run: |
          kubectl apply -f k8s/apps/
          kubectl apply -f k8s/root-app.yaml

      # ── Summary ──────────────────────────────────────────────────
      - name: Bootstrap summary
        if: steps.aks.outputs.exists == 'true'
        run: |
          echo "### Cluster Bootstrap Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.argocd.outputs.status }}" = "install" ]; then
            echo "🆕 ArgoCD installed and apps applied. Components deploying via ArgoCD." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔑 Get ArgoCD admin password:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ ArgoCD already deployed. Apps re-applied." >> $GITHUB_STEP_SUMMARY
          fi
