# ArgoCD Application for ambience — first app on the per-app K8s deployment
# pattern (infra-bootstrap#24). Source manifests now live in the ambience repo
# under chart/ambience, keeping the app's deployable source with the app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ambience
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/romaine-life/ambience.git
    targetRevision: main
    path: chart/ambience
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ambience
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
