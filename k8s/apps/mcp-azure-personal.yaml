apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-azure-personal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Repo was renamed from mcp-azure-admin → mcp-azure-personal; the
    # old URL still works via GitHub's automatic redirect but the
    # canonical name keeps ArgoCD's tracking and webhook routing clean.
    repoURL: https://github.com/romaine-life/mcp-azure-personal.git
    targetRevision: main
    path: chart
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-azure-personal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
