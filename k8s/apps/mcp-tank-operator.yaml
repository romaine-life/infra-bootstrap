apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-tank-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nelsong6/mcp-tank-operator.git
    targetRevision: main
    path: chart
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-tank-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
