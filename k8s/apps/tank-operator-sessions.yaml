# Visualization-only app for tank-operator's dynamic session Deployments.
#
# The orchestrator stamps each session Deployment with the tracking-id
# `tank-operator-sessions:...`, so ArgoCD claims them into this app's tree.
# The chart at `k8s-sessions/` in the tank-operator repo is intentionally
# empty — there's nothing here for Argo to *reconcile*; the app exists so we
# can *see* the live state in the UI alongside the rest of the platform.
#
# No `syncPolicy.automated` block: prune+selfHeal would either delete the
# claimed extras or fight the orchestrator, neither of which we want. App
# will sit at OutOfSync whenever sessions are running — that's expected.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tank-operator-sessions
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/romaine-life/tank-operator.git
    targetRevision: main
    path: k8s-sessions
  destination:
    server: https://kubernetes.default.svc
    namespace: tank-operator-sessions
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
