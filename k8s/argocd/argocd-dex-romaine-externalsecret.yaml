# ============================================================================
# Dex OIDC client secret for human SSO via auth.romaine.life
# ============================================================================
# Feeds $dex.romaine.clientSecret (referenced in values.yaml dex.config) into
# the chart-managed argocd-secret. The OIDC client ("argocd") is registered
# as a trustedClient in the auth.romaine.life OIDC provider; this is the
# matching client secret both sides share.
#
# Sourced from the ng6-auth Key Vault — the same secret auth.romaine.life
# reads as OIDC_ARGOCD_CLIENT_SECRET. The ng6-auth ClusterSecretStore is
# cluster-scoped (defined by the auth app's chart), so the external-secrets
# controller — which holds read access to ng6-auth via its workload identity —
# resolves it for this argocd-namespace ExternalSecret. One secret, one KV
# entry, no per-consumer copy to keep in sync.
#
# KV entry is populated out of band:
#   az keyvault secret set --vault-name ng6-auth \
#     --name argocd-shared-oidc-client-secret --value "$(openssl rand -hex 32)"
# Rotate by setting a new value and re-rolling the auth pod + argocd-dex-server.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret-dex-romaine
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ng6-auth
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: dex.romaine.clientSecret
      remoteRef:
        key: argocd-shared-oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
