# ============================================================================
# GitHub App credentials for ArgoCD (webhooks + authenticated polls)
# ============================================================================
# Backed by a dedicated GitHub App (romaine-life-argocd), distinct from
# romaine-life-app[bot] which owns the commit/PR identity. Keeping them
# separate means a webhook-secret rotation here doesn't disturb CI's
# token, and vice versa.
#
# Drives two things off the same four KV entries:
#   1. A repo-creds Secret keyed at url=https://github.com/nelsong6 so
#      every public app repo (fzt-frontend, my-homepage, glimmung, ...)
#      authenticates on git ls-remote/clone via App tokens (15k/hr) and
#      stops getting throttled by GitHub's 60/hr anonymous budget.
#   2. webhook.github.secret merged into the chart-managed argocd-secret
#      so push events validate and immediately refresh the matching
#      Application instead of waiting for the next poll.
#
# KV secrets are populated out of band via `az keyvault secret set`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ng6-argocd
    kind: ClusterSecretStore
  target:
    name: github-app-repo-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        url: https://github.com/nelsong6
        githubAppID: "{{ .githubAppID }}"
        githubAppInstallationID: "{{ .githubAppInstallationID }}"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: githubAppID
      remoteRef:
        key: argocd-github-app-id
        # The four documented ESO defaults — spelled out so server-side
        # apply by ArgoCD doesn't perpetually loop OutOfSync because the
        # API server defaulted them in.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: githubAppInstallationID
      remoteRef:
        key: argocd-github-app-installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: argocd-github-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
# Merge-only — keeps chart-owned keys in argocd-secret (admin.password,
# server.secretkey) while sourcing OAuth/webhook material from Key Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret-webhook-github
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ng6-argocd
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    # Human SSO no longer needs a secret here: ArgoCD is a native OIDC public
    # client to auth.romaine.life (PKCE, see values.yaml oidc.config). This
    # ExternalSecret only carries the GitHub webhook secret now.
    - secretKey: webhook.github.secret
      remoteRef:
        key: argocd-github-webhook-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
