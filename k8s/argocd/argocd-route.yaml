# HTTPRoute for the ArgoCD UI. Dual parentRef:
#   - XListenerSet (app-owned HTTPS listener on 443, with cert)
#   - Gateway main (platform HTTP listener on 80 — also the source ExternalDNS
#     reads to create the A record; ExternalDNS v0.20 doesn't yet follow
#     XListenerSet parents, tracked by external-dns#5694)
# Auth handled by ArgoCD's built-in OIDC via dex, federated to auth.romaine.life.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  hostnames:
    - argocd.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: argocd
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
