apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.5.2
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
resources:
  - argocd-cert.yaml
  - argocd-xlistenerset.yaml
  - argocd-route.yaml
  - argocd-secretstore.yaml
  - argocd-github-app-externalsecret.yaml
