# ArgoCD Helm chart values (argo/argo-cd)
# Minimal config for personal infra — single replica, no HA.
# Routing handled by Gateway API (HTTPRoute + Envoy Gateway),
# not ArgoCD's built-in ingress.

global:
  logging:
    level: warn

configs:
  # Enable Kustomize Helm chart inflation
  cm:
    kustomize.buildOptions: --enable-helm
    url: https://argocd.romaine.life
    # Webhook deliveries from the romaine-life-argocd GitHub App refresh
    # affected Applications immediately; polling only catches missed
    # deliveries, so 5m is plenty (chart default is 2m, which thrashed
    # GitHub's anonymous rate limit before repo-creds was wired).
    timeout.reconciliation: 5m
    dex.config: |
      connectors:
        # Human SSO via auth.romaine.life — the single source of truth for
        # who gets in (and at what role) across every romaine.life app.
        # Dex autodiscovers from the root discovery doc (issuer-match is
        # exact, hence the bare origin as issuer) and pulls the `role`/
        # `groups` claims from /oauth2/userinfo, which the RBAC block below
        # maps to ArgoCD roles. Replaces the old dedicated Microsoft app
        # registration + static per-email admin list. The shared OIDC
        # client secret lives in ng6-auth (see argocd-dex-romaine-
        # externalsecret.yaml).
        - type: oidc
          id: romaine
          name: romaine.life
          config:
            issuer: https://auth.romaine.life
            clientID: argocd
            clientSecret: $dex.romaine.clientSecret
            redirectURI: https://argocd.romaine.life/api/dex/callback
            scopes:
              - openid
              - profile
              - email
            # role/groups are surfaced on the userinfo response, not the
            # base id_token, so Dex must call the userinfo endpoint.
            getUserInfo: true
            # Dex's oidc connector drops the upstream `groups` claim unless
            # this is set — without it, RBAC's `g, admin, role:admin` never
            # matches and every SSO user falls back to readonly.
            insecureEnableGroups: true
            insecureSkipEmailVerified: true
        # Federate AKS-issued projected SA tokens. In-cluster MCP servers
        # mint a SA token with aud=argocd-mcp and exchange it for an ArgoCD
        # bearer via /api/dex/token (grant_type=token-exchange,
        # connector_id=aks-sa). No static API tokens leave the cluster.
        - type: oidc
          id: aks-sa
          name: AKS Service Account
          config:
            issuer: https://westus2.oic.prod-aks.azure.com/2236b5e4-81d2-4d82-bde5-17b1037999ea/5aced6d5-4299-421b-84a9-6638aebbf4f0/
            clientID: argocd-mcp
            clientSecret: unused-public-client
            scopes:
              - openid
            getUserInfo: false
            insecureSkipEmailVerified: true
            userIDKey: sub
            userNameKey: sub
  # RBAC — default readonly; admin is granted by auth.romaine.life, not by
  # a list maintained here. auth.romaine.life issues a `role` claim that the
  # OIDC provider mirrors into a `groups` array; Dex forwards `groups`, and
  # the single mapping below grants admin to anyone auth.romaine.life marks
  # role=admin. To grant/revoke an admin, change their role in
  # auth.romaine.life — there is no email list in this repo anymore. The
  # ArgoCD local `admin` account remains the break-glass if SSO is down.
  rbac:
    policy.default: role:readonly
    scopes: '[groups]'
    policy.csv: |
      g, admin, role:admin
      # mcp-argocd's projected SA token federates through the aks-sa Dex
      # connector. Dex re-issues with `sub` set to a base64url protobuf of
      # (connector_id, user_id) — that's the literal blob below, NOT the
      # bare `system:serviceaccount:mcp-argocd:mcp-argocd`. The previous
      # CSV used the SA name and was effectively dead code (the readonly
      # default was what allowed `applications, get` calls; `sync` was
      # denied for the same reason). Tracked upstream: dexidp/dex#1577.
      g, CitzeXN0ZW06c2VydmljZWFjY291bnQ6bWNwLWFyZ29jZDptY3AtYXJnb2NkEgZha3Mtc2E, role:mcp-argocd
      p, role:mcp-argocd, applications, get, */*, allow
      p, role:mcp-argocd, applications, sync, */*, allow
      p, role:mcp-argocd, projects, get, *, allow
      p, role:mcp-argocd, repositories, get, *, allow
      p, role:mcp-argocd, clusters, get, *, allow

# Single replica — personal infra, no HA needed
controller:
  replicas: 1

server:
  replicas: 1
  # Gateway handles TLS termination — disable ArgoCD's internal TLS
  extraArgs:
    - --insecure

repoServer:
  replicas: 1

redis:
  enabled: true

# Dex handles SSO — supports multiple identity providers
dex:
  enabled: true

# Disable notifications (can enable later)
notifications:
  enabled: false

# Disable applicationSet (can enable later if needed)
applicationSet:
  enabled: false
