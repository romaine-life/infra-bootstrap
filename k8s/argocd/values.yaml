# ArgoCD Helm chart values (argo/argo-cd)
# Minimal config for personal infra — single replica, no HA.
# Routing handled by Gateway API (HTTPRoute + Envoy Gateway),
# not ArgoCD's built-in ingress.

global:
  logging:
    level: warn

configs:
  # Enable Kustomize Helm chart inflation
  cm:
    kustomize.buildOptions: --enable-helm
    url: https://argocd.romaine.life
    # Webhook deliveries from the romaine-life-argocd GitHub App refresh
    # affected Applications immediately; polling only catches missed
    # deliveries, so 5m is plenty (chart default is 2m, which thrashed
    # GitHub's anonymous rate limit before repo-creds was wired).
    timeout.reconciliation: 5m
    # Human SSO — ArgoCD as a DIRECT, native OIDC relying party to
    # auth.romaine.life (the single source of truth for who gets in, and at
    # what role, across every romaine.life app). Same shape as Grafana: no
    # middle-man Dex, no client secret. ArgoCD only supports PKCE as a public
    # client, and auth.romaine.life requires PKCE, so enablePKCEAuthentication
    # is the whole client credential — the code challenge authenticates the
    # exchange. ArgoCD autodiscovers the endpoints from the root discovery doc
    # (issuer = bare origin, matched exactly). `groups` arrives on the
    # id_token (auth mirrors the platform `role` into it); the RBAC block maps
    # it. Replaces the old dedicated Microsoft app registration + static
    # per-email admin list. This is now the ONLY SSO mechanism — Dex is
    # retired (dex.enabled: false below), and mcp-argocd authenticates through
    # this same provider with a role=service token (see allowedAudiences).
    oidc.config: |
      name: romaine.life
      issuer: https://auth.romaine.life
      clientID: argocd
      enablePKCEAuthentication: true
      requestedScopes:
        - openid
        - profile
        - email
      # Human login id_tokens carry aud=clientID ("argocd"). The mcp-argocd
      # service identity authenticates to the API with an auth.romaine.life
      # role=service JWT minted via /api/auth/exchange/k8s, which carries
      # aud=<issuer>=https://auth.romaine.life. argocd-server verifies any
      # non-"argocd"-issuer bearer against this provider's JWKS
      # (sessionmanager.VerifyToken), but only if the token's aud is allowed —
      # so both audiences must be listed.
      allowedAudiences:
        - argocd
        - https://auth.romaine.life
    # No dex.config. Dex is fully retired: human SSO is native oidc.config
    # (above) and mcp-argocd now authenticates with an auth.romaine.life
    # role=service JWT (verified via oidc.config), so the bundled Dex has no
    # remaining consumer. The argocd-dex-server Deployment is disabled below.
  # RBAC — default readonly; admin is granted by auth.romaine.life, not by a
  # list maintained here. auth.romaine.life mirrors each user's platform
  # `role` into a `groups` claim on the id_token; `scopes: '[groups]'` makes
  # ArgoCD read it, and the single mapping below grants admin to anyone
  # auth.romaine.life marks role=admin. To grant/revoke an admin, change their
  # role in auth.romaine.life — there is no email list in this repo anymore.
  # The ArgoCD local `admin` account remains the break-glass if SSO is down.
  rbac:
    policy.default: role:readonly
    # `groups` is what human SSO tokens carry (mirrored from the platform
    # role); `sub` is how the mcp-argocd service identity is matched — its
    # auth.romaine.life role=service JWT has no groups but a stable
    # sub=svc:mcp-argocd:mcp-argocd.
    scopes: '[groups, sub]'
    policy.csv: |
      g, admin, role:admin
      # mcp-argocd authenticates to the Argo CD API with an auth.romaine.life
      # role=service JWT (minted via /api/auth/exchange/k8s); argocd-server
      # verifies it against the auth.romaine.life JWKS and matches its stable
      # subject here.
      g, svc:mcp-argocd:mcp-argocd, role:mcp-argocd
      p, role:mcp-argocd, applications, get, */*, allow
      p, role:mcp-argocd, applications, sync, */*, allow
      p, role:mcp-argocd, projects, get, *, allow
      p, role:mcp-argocd, repositories, get, *, allow
      p, role:mcp-argocd, clusters, get, *, allow

# Single replica — personal infra, no HA needed
controller:
  replicas: 1
  # Expose the application-controller metrics endpoint (:8082) and scrape it.
  # These are the signals the reconcile-staleness alerts depend on
  # (argocd_app_info sync/health, argocd_app_reconcile_count). Without this,
  # ArgoCD ships ZERO metrics to Prometheus and the silent-auto-sync-stop
  # outage of 2026-06-03 had nothing to alert on. The kube-prometheus-stack
  # Prometheus discovers ServiceMonitors cluster-wide
  # (serviceMonitorSelectorNilUsesHelmValues: false), so no extra labels are
  # needed for it to pick these up from the argocd namespace.
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  replicas: 1
  # Gateway handles TLS termination — disable ArgoCD's internal TLS
  extraArgs:
    - --insecure
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

redis:
  enabled: true

# Dex is retired. Human SSO is native oidc.config and mcp-argocd uses an
# auth.romaine.life role=service JWT — nothing consumes Dex, so don't deploy
# argocd-dex-server.
dex:
  enabled: false

# Disable notifications (can enable later)
notifications:
  enabled: false

# Disable applicationSet (can enable later if needed)
applicationSet:
  enabled: false
