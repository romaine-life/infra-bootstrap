# Values for the gateway-helm dependency chart. Overrides under the chart's
# name (`gateway-helm`) as required by Helm's subchart value-scoping rules.
gateway-helm:
  config:
    envoyGateway:
      # Enable the experimental XListenerSet API so apps can declare their
      # own HTTPS listeners in their own namespaces and attach to the shared
      # `main` Gateway cross-namespace. Without this flag the controller
      # ignores XListenerSet resources.
      gatewayAPI:
        enabled:
          - XListenerSet
      # Enable the Backend extension API so Gateway routes can target external
      # FQDN destinations (e.g. api.github.com) via Backend resources. The
      # locked-down implementation-agent egress path uses a TLSRoute (SNI
      # passthrough) -> Backend to allow api.github.com by name, avoiding an
      # IP/CIDR allowlist. Without this flag the controller ignores Backend.
      extensionApis:
        enableBackend: true
