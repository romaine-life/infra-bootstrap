# ClusterSecretStore for the platform/shared Azure Key Vault.
# App-owned Key Vault stores belong in the app repos that provision them.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: romaine-kv
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://romaine-kv.vault.azure.net
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
