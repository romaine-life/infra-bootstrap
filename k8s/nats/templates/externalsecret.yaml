apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tank-nats-auth
  namespace: nats
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ng6-nats
    kind: ClusterSecretStore
  target:
    name: tank-nats-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: tank-nats-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
# tank-operator#1128 stage 2: the auth-callout static user's password,
# referenced by the server config's NATS_CALLOUT_PASSWORD env above. The
# issuer SEED deliberately does NOT land in this namespace — only the
# callout deployment (tank-operator namespace) holds signing material.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tank-nats-callout
  namespace: nats
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ng6-nats
    kind: ClusterSecretStore
  target:
    name: tank-nats-callout
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: tank-nats-callout-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
